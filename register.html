    <style>
      * { box-sizing: border-box; }
      body { margin: 0; font-family: Arial, sans-serif; background-color: #f5f5f5; color: #111111; }

      .form-group input { width: 100%; padding: 10px; border: 1px solid #dddddd; border-radius: 4px; font-size: 1em; background-color: #f9f9f9; }
      .form-group input:focus { outline: none; border-color: #111111; background-color: #ffffff; }
      .btn-submit { width: 100%; padding: 12px; background-color: #111111; color: #ffffff; border: none; border-radius: 4px; font-size: 1em; cursor: pointer; margin-top: 8px; }

      .success-msg { display: none; background: #f0fff0; border: 1px solid #cceecc; color: #006600; padding: 10px; border-radius: 4px; margin-bottom: 16px; font-size: 0.9em; }

        main { padding: 24px 20px; }
        h2 { font-size: 1.3em; }
      }

  <body>

    <header>
      <img src="logo.png" alt="Pinnacle Darts Logo">
      <div>
        <h1>Pinnacle Darts League</h1>
        <p>Official League Website</p>
      </div>
      <div class="header-buttons">
        <a href="academy.html" class="btn-switch">Switch to Academy</a>
        <a href="login.html" class="btn-login">Login / Register</a>
        <button class="hamburger" onclick="toggleMenu()">☰</button>
      </div>
    </header>

    <nav id="mainNav">
      <a href="index.html">Home</a>
      <a href="leagues.html">Leagues</a>
      <a href="tournaments.html">Tournaments</a>
      <a href="players.html">Players</a>
    </nav>

    <main>
      <h2>Create an Account</h2>
      <div class="form-box">

        <div class="error-msg" id="errorMsg"></div>
        <div class="success-msg" id="successMsg">Account created successfully! Redirecting to login...</div>

        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="fullName" placeholder="Enter your full name" />
        </div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" placeholder="Choose a username" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="Enter your email" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Choose a password" />
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Confirm your password" />
        </div>
        <button class="btn-submit" onclick="register()">Create Account</button>
        <div class="login-link">
          Already have an account? <a href="login.html">Login here</a>
        </div>
      </div>
    </main>

    <script>
      async function register() {
        const fullName = document.getElementById('fullName').value.trim();
        const username = document.getElementById('username').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');

        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';

        if (!fullName || !username || !email || !password) {
          errorMsg.textContent = 'Please fill in all fields.';
          errorMsg.style.display = 'block';
          return;
        }

        if (password !== confirmPassword) {
          errorMsg.textContent = 'Passwords do not match.';
          errorMsg.style.display = 'block';
          return;
        }

        if (password.length < 6) {
          errorMsg.textContent = 'Password must be at least 6 characters.';
          errorMsg.style.display = 'block';
          return;
        }

        const { data, error } = await supabase.auth.signUp({
          email,
          password,
          options: {
            data: { full_name: fullName, username }
          }
        });

        if (error) {
          errorMsg.textContent = error.message;
          errorMsg.style.display = 'block';
          return;
        }

        const { error: profileError } = await supabase
          .from('profiles')
          .insert([{
            id: data.user.id,
            full_name: fullName,
            username,
            email
          }]);

        if (profileError) {
          errorMsg.textContent = 'Account created but profile save failed. Please contact admin.';
          errorMsg.style.display = 'block';
          return;
        }

        successMsg.style.display = 'block';
        setTimeout(() => window.location.href = 'login.html', 2000);
      }

      function toggleMenu() {
        document.getElementById('mainNav').classList.toggle('open');
      }
    </script>

  </body>
