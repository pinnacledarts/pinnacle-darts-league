<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Players | Pinnacle Darts League</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; font-family: Arial, sans-serif; background-color: #f5f5f5; color: #111111; }

      header { background-color: #000000; padding: 20px 40px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
      header img { height: 70px; }
      header h1 { margin: 0; color: #ffffff; font-size: 2em; }
      header p { margin: 4px 0 0; color: #cccccc; font-size: 1em; }

      .header-buttons { margin-left: auto; display: flex; gap: 10px; align-items: center; }
      .btn-switch, .btn-login, .btn-logout { color: #ffffff; text-decoration: none; border: 1px solid #ffffff; padding: 8px 18px; border-radius: 4px; font-size: 0.9em; white-space: nowrap; text-align: center; min-width: 160px; cursor: pointer; background: none; font-family: Arial, sans-serif; }
      .btn-switch:hover, .btn-login:hover, .btn-logout:hover { background-color: #ffffff; color: #000000; }
      .btn-username { color: #ffffff; font-size: 0.9em; white-space: nowrap; }

      .hamburger { display: none; background: none; border: none; color: #ffffff; font-size: 1.8em; cursor: pointer; padding: 0 10px; }

      nav { background-color: #222222; display: flex; justify-content: center; gap: 40px; padding: 15px; }
      nav a { color: #ffffff; text-decoration: none; font-size: 1.1em; text-transform: uppercase; letter-spacing: 1px; }
      nav a:hover { color: #aaaaaa; }

      main { padding: 40px; max-width: 900px; margin: 0 auto; }
      h2 { border-bottom: 3px solid #111111; padding-bottom: 8px; }

      .search-box { background-color: #ffffff; border: 1px solid #dddddd; border-radius: 8px; padding: 20px; margin-bottom: 30px; }
      .search-box label { font-weight: bold; display: block; margin-bottom: 10px; }
      .search-controls { display: flex; gap: 12px; flex-wrap: wrap; }
      .search-controls input, .search-controls select { flex: 1; min-width: 140px; padding: 10px 14px; border: 1px solid #dddddd; border-radius: 4px; font-size: 1em; background-color: #f9f9f9; }
      .search-controls input:focus, .search-controls select:focus { outline: none; border-color: #000000; }

      .profile-card { background-color: #ffffff; border: 1px solid #dddddd; border-radius: 8px; padding: 30px; margin-bottom: 20px; }
      .profile-top { display: flex; align-items: center; gap: 24px; margin-bottom: 30px; flex-wrap: wrap; }
      .player-avatar { width: 90px; height: 90px; border-radius: 50%; background-color: #000000; color: #ffffff; font-size: 2.2em; font-weight: bold; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
      .profile-info h3 { margin: 0 0 4px; font-size: 1.8em; }
      .profile-info .username { color: #888888; font-size: 0.95em; margin-bottom: 4px; }
      .profile-info .location { font-size: 0.9em; color: #555555; }

      .key-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 30px; }
      .stat-box { border: 1px solid #dddddd; border-radius: 8px; padding: 20px; text-align: center; }
      .stat-box .stat-label { font-size: 0.8em; color: #888888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
      .stat-box .stat-value { font-size: 2em; font-weight: bold; }

      .details-section { border-top: 1px solid #eeeeee; padding-top: 20px; }
      .details-section h4 { font-size: 1em; margin: 0 0 16px; padding-left: 12px; border-left: 4px solid #000000; }
      .detail-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.95em; }
      .detail-row:last-child { border-bottom: none; }
      .detail-row .detail-label { color: #555555; }
      .detail-row .detail-value { font-weight: bold; text-align: right; }

      .loading { text-align: center; padding: 40px; color: #888888; }

      @media (max-width: 700px) {
        header { flex-wrap: wrap; padding: 16px 20px; }
        header img { height: 50px; }
        header h1 { font-size: 1.4em; }
        header p { font-size: 0.85em; }
        .header-buttons { margin-left: 0; width: 100%; justify-content: flex-end; flex-wrap: wrap; }
        .btn-switch, .btn-login, .btn-logout { font-size: 0.8em; padding: 6px 12px; min-width: 140px; }
        .hamburger { display: block; }
        nav { display: none; flex-direction: column; gap: 0; padding: 0; }
        nav.open { display: flex; }
        nav a { padding: 14px 20px; border-bottom: 1px solid #333333; font-size: 1em; }
        main { padding: 24px 20px; }
        h2 { font-size: 1.3em; }
        .key-stats { grid-template-columns: 1fr 1fr; }
        .profile-top { gap: 14px; }
        .player-avatar { width: 70px; height: 70px; font-size: 1.8em; }
        .profile-info h3 { font-size: 1.4em; }
      }
    </style>
  </head>
  <body>

    <header>
      <img src="logo.png" alt="Pinnacle Darts Logo">
      <div>
        <h1>Pinnacle Darts League</h1>
        <p>Official League Website</p>
      </div>
      <a href="academy.html" class="btn-switch">Switch to Academy</a>
      <div class="header-buttons" style="margin-left: auto;">
        <div id="authButtons"></div>
        <button class="hamburger" onclick="toggleMenu()">☰</button>
      </div>
    </header>

    <nav id="mainNav">
      <a href="index.html">Home</a>
      <a href="leagues.html">Leagues</a>
      <a href="tournaments.html">Tournaments</a>
      <a href="players.html">Players</a>
    </nav>

    <main>
      <h2>Players</h2>

      <div class="search-box">
        <label>View Player</label>
        <div class="search-controls">
          <input type="text" id="searchInput" placeholder="Search by name or username..." oninput="filterPlayers()" />
          <select id="playerDropdown" onchange="selectFromDropdown()">
            <option value="">-- Select a player --</option>
          </select>
        </div>
      </div>

      <div id="profileCard" class="profile-card" style="display:none;">
        <div class="profile-top">
          <div class="player-avatar" id="profileAvatar"></div>
          <div class="profile-info">
            <h3 id="profileName"></h3>
            <div class="username" id="profileUsername"></div>
            <div class="location" id="profileLocation"></div>
          </div>
        </div>

        <div class="key-stats">
          <div class="stat-box"><div class="stat-label">Average</div><div class="stat-value" id="profileAverage">-</div></div>
          <div class="stat-box"><div class="stat-label">Wins</div><div class="stat-value" id="profileWins">-</div></div>
          <div class="stat-box"><div class="stat-label">Matches</div><div class="stat-value" id="profileMatches">-</div></div>
        </div>

        <div class="details-section">
          <h4>Player Details</h4>
          <div class="detail-row"><span class="detail-label">Member Since</span><span class="detail-value" id="profileMemberSince">-</span></div>
          <div class="detail-row"><span class="detail-label">Highest Checkout</span><span class="detail-value" id="profileCheckout">-</span></div>
          <div class="detail-row"><span class="detail-label">Country</span><span class="detail-value" id="profileCountry">-</span></div>
          <div class="detail-row"><span class="detail-label">Hometown</span><span class="detail-value" id="profileHometown">-</span></div>
          <div class="detail-row"><span class="detail-label">Darts Brand</span><span class="detail-value" id="profileBrand">-</span></div>
          <div class="detail-row"><span class="detail-label">Dart Weight</span><span class="detail-value" id="profileWeight">-</span></div>
          <div class="detail-row"><span class="detail-label">Walkout Song</span><span class="detail-value" id="profileWalkout">-</span></div>
          <div class="detail-row"><span class="detail-label">Favourite Player</span><span class="detail-value" id="profileFavPlayer">-</span></div>
          <div class="detail-row"><span class="detail-label">Platform</span><span class="detail-value" id="profilePlatform">-</span></div>
        </div>
      </div>

      <div id="loadingMsg" class="loading">Loading players...</div>

    </main>

    <script>
      let allPlayers = [];

      async function loadPlayers() {
        const { data, error } = await sbClient
          .from('profiles')
          .select('*')
          .order('full_name', { ascending: true });

        if (error) {
          document.getElementById('loadingMsg').textContent = 'Error loading players.';
          return;
        }

        allPlayers = data;
        document.getElementById('loadingMsg').style.display = 'none';

        const dropdown = document.getElementById('playerDropdown');
        dropdown.innerHTML = '<option value="">-- Select a player --</option>';
        data.forEach(p => {
          const option = document.createElement('option');
          option.value = p.id;
          option.textContent = p.full_name || p.username;
          dropdown.appendChild(option);
        });

        if (data.length > 0) showPlayer(data[0]);
      }

      function showPlayer(p) {
        document.getElementById('profileCard').style.display = 'block';
        document.getElementById('profileAvatar').textContent = (p.full_name || p.username || '?')[0].toUpperCase();
        document.getElementById('profileName').textContent = p.full_name || p.username || '-';
        document.getElementById('profileUsername').textContent = p.username ? '@' + p.username : '-';
        document.getElementById('profileLocation').textContent = [p.country, p.hometown].filter(Boolean).join(' • ') || '-';
        document.getElementById('profileAverage').textContent = p.average || '-';
        document.getElementById('profileWins').textContent = p.wins || '-';
        document.getElementById('profileMatches').textContent = p.matches || '-';
        document.getElementById('profileMemberSince').textContent = p.created_at ? new Date(p.created_at).toLocaleDateString('en-GB', { month: 'long', year: 'numeric' }) : '-';
        document.getElementById('profileCheckout').textContent = p.highest_checkout || '-';
        document.getElementById('profileCountry').textContent = p.country || '-';
        document.getElementById('profileHometown').textContent = p.hometown || '-';
        document.getElementById('profileBrand').textContent = p.darts_brand || '-';
        document.getElementById('profileWeight').textContent = p.dart_weight || '-';
        document.getElementById('profileWalkout').textContent = p.walkout_song || '-';
        document.getElementById('profileFavPlayer').textContent = p.favourite_player || '-';
        document.getElementById('profilePlatform').textContent = p.platform ? p.platform.charAt(0).toUpperCase() + p.platform.slice(1) : '-';
      }

      function filterPlayers() {
        const val = document.getElementById('searchInput').value.toLowerCase().trim();
        if (!val) return;

        const match = allPlayers.find(p =>
          (p.full_name && p.full_name.toLowerCase().startsWith(val)) ||
          (p.username && p.username.toLowerCase().startsWith(val))
        );

        if (match) {
          document.getElementById('playerDropdown').value = match.id;
          showPlayer(match);
        }
      }

      function selectFromDropdown() {
        const id = document.getElementById('playerDropdown').value;
        const player = allPlayers.find(p => p.id === id);
        if (player) {
          document.getElementById('searchInput').value = player.full_name || player.username;
          showPlayer(player);
        }
      }

      function toggleMenu() {
        document.getElementById('mainNav').classList.toggle('open');
      }

      window.addEventListener('load', () => {
        checkAuth();
        loadPlayers();
      });
    </script>

  </body>
</html>
