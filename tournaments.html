<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournaments | Pinnacle Darts League</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; font-family: Arial, sans-serif; background-color: #f5f5f5; color: #111111; }

      header { background-color: #000000; padding: 20px 40px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
      header img { height: 70px; }
      header h1 { margin: 0; color: #ffffff; font-size: 2em; }
      header p { margin: 4px 0 0; color: #cccccc; font-size: 1em; }

      .header-buttons { margin-left: auto; display: flex; gap: 10px; align-items: center; }
      .btn-switch, .btn-login { color: #ffffff; text-decoration: none; border: 1px solid #ffffff; padding: 8px 18px; border-radius: 4px; font-size: 0.9em; white-space: nowrap; }
      .btn-switch:hover, .btn-login:hover { background-color: #ffffff; color: #000000; }

      .hamburger { display: none; background: none; border: none; color: #ffffff; font-size: 1.8em; cursor: pointer; padding: 0 10px; }

      nav { background-color: #222222; display: flex; justify-content: center; gap: 40px; padding: 15px; }
      nav a { color: #ffffff; text-decoration: none; font-size: 1.1em; text-transform: uppercase; letter-spacing: 1px; }
      nav a:hover { color: #aaaaaa; }

      main { padding: 40px; max-width: 900px; margin: 0 auto; }
      h2 { border-bottom: 3px solid #111111; padding-bottom: 8px; }

      .tournament-card { background-color: #ffffff; border: 1px solid #dddddd; border-radius: 6px; padding: 20px; margin-bottom: 16px; }
      .tournament-card h3 { margin: 0 0 8px; font-size: 1.2em; }
      .tournament-card p { margin: 4px 0; color: #555555; font-size: 0.95em; }

      .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.8em; font-weight: bold; margin-bottom: 10px; }
      .badge-upcoming { background-color: #111111; color: #ffffff; }
      .badge-completed { background-color: #dddddd; color: #111111; }

      .coming-soon { text-align: center; padding: 60px 20px; color: #aaaaaa; font-size: 1.1em; }

      @media (max-width: 700px) {
        header { flex-wrap: wrap; padding: 16px 20px; }
        header img { height: 50px; }
        header h1 { font-size: 1.4em; }
        header p { font-size: 0.85em; }

        .header-buttons { margin-left: 0; width: 100%; justify-content: flex-end; }
        .btn-login { font-size: 0.8em; padding: 6px 12px; }

        .hamburger { display: block; }

        nav { display: none; flex-direction: column; gap: 0; padding: 0; }
        nav.open { display: flex; }
        nav a { padding: 14px 20px; border-bottom: 1px solid #333333; font-size: 1em; }

        main { padding: 24px 20px; }
        h2 { font-size: 1.3em; }
      }
    </style>
  </head>
  <body>

    <header>
      <img src="logo.png" alt="Pinnacle Darts Logo">
      <div>
        <h1>Pinnacle Darts League</h1>
        <p>Official League Website</p>
      </div>
      <div class="header-buttons">
        <a href="academy.html" class="btn-switch">Switch to Academy</a>
        <a href="login.html" class="btn-login">Login / Register</a>
        <button class="hamburger" onclick="toggleMenu()">☰</button>
      </div>
    </header>

    <nav id="mainNav">
      <a href="index.html">Home</a>
      <a href="leagues.html">Leagues</a>
      <a href="tournaments.html">Tournaments</a>
      <a href="players.html">Players</a>
    </nav>

    <main>
      <h2>Tournaments</h2>

      <div class="tournament-card">
        <span class="badge badge-upcoming">Upcoming</span>
        <h3>Pinnacle Open — Season 1</h3>
        <p><strong>Date:</strong> TBC</p>
        <p><strong>Format:</strong> Single elimination</p>
        <p><strong>Players:</strong> Open entry</p>
        <p>Details to be confirmed. Check back soon.</p>
      </div>

      <div class="coming-soon">🎯 More tournaments coming soon</div>
    </main>

    <script>
      function toggleMenu() {
        document.getElementById('mainNav').classList.toggle('open');
      }
    </script>

  </body>
</html>
